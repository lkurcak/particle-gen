<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle SDF Generator</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <div id="tabs"></div>
  <div id="main">
    <div id="canvas-container" class="checkerboard">
      <canvas id="glcanvas"></canvas>
    </div>
    <div id="sidebar">
      <div id="layers-header">
        <span>SDF Layers</span>
        <div id="layer-controls">
          <select id="new-layer-type">
            <option value="circle">Circle</option>
            <option value="rectangle">Rectangle</option>
          </select>
          <button id="btn-add-layer" class="secondary">Add</button>
        </div>
      </div>
      <div id="layers-list"></div>
      <div id="params-panel">
        <div id="params-content">
          <div class="empty-state">Select a layer to edit its parameters</div>
        </div>
      </div>
      <div id="export-controls">
        <div class="control-row">
          <label>Preview BG</label>
          <select id="preview-bg-select">
            <option value="checkerboard">Checkerboard</option>
            <option value="black">Black</option>
          </select>
        </div>
        <div class="control-row">
          <label>Export Size</label>
          <select id="export-size-select">
            <option value="32">32</option>
            <option value="64">64</option>
            <option value="128" selected>128</option>
            <option value="256">256</option>
            <option value="512">512</option>
          </select>
        </div>
        <div class="control-row">
          <label>Export BG</label>
          <select id="export-bg-select">
            <option value="transparent">Transparent</option>
            <option value="black">Black</option>
          </select>
        </div>
        <button id="btn-export-png">Export PNG</button>
        <div class="btn-row">
          <button id="btn-export-json" class="secondary">Export JSON</button>
          <button id="btn-import-json" class="secondary">Import JSON</button>
        </div>
        <input type="file" id="import-file" accept=".json,application/json" style="display:none">
      </div>
    </div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
