<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- soft glow background -->
  <circle cx="16" cy="16" r="15" fill="url(#glow)"/>

  <!-- main cross rays -->
  <g stroke="#4a9eff" stroke-width="2.5" stroke-linecap="round">
    <line x1="16" y1="2" x2="16" y2="9"/>
    <line x1="16" y1="23" x2="16" y2="30"/>
    <line x1="2" y1="16" x2="9" y2="16"/>
    <line x1="23" y1="16" x2="30" y2="16"/>
  </g>

  <!-- diagonal rays -->
  <g stroke="#6ab8ff" stroke-width="2" stroke-linecap="round">
    <line x1="5.8" y1="5.8" x2="11" y2="11"/>
    <line x1="21" y1="21" x2="26.2" y2="26.2"/>
    <line x1="26.2" y1="5.8" x2="21" y2="11"/>
    <line x1="11" y1="21" x2="5.8" y2="26.2"/>
  </g>

  <!-- bright core -->
  <circle cx="16" cy="16" r="4.5" fill="#ffffff"/>
  <circle cx="16" cy="16" r="3" fill="#cce6ff"/>
</svg>
