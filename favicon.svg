<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- soft glow background -->
  <circle cx="16" cy="16" r="14" fill="url(#glow)"/>

  <!-- main cross rays -->
  <g stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round">
    <line x1="16" y1="2" x2="16" y2="8"/>
    <line x1="16" y1="24" x2="16" y2="30"/>
    <line x1="2" y1="16" x2="8" y2="16"/>
    <line x1="24" y1="16" x2="30" y2="16"/>
  </g>

  <!-- diagonal rays -->
  <g stroke="#6ab8ff" stroke-width="1" stroke-linecap="round">
    <line x1="6.8" y1="6.8" x2="10.5" y2="10.5"/>
    <line x1="21.5" y1="21.5" x2="25.2" y2="25.2"/>
    <line x1="25.2" y1="6.8" x2="21.5" y2="10.5"/>
    <line x1="10.5" y1="21.5" x2="6.8" y2="25.2"/>
  </g>

  <!-- bright core -->
  <circle cx="16" cy="16" r="3.5" fill="#ffffff"/>
  <circle cx="16" cy="16" r="2" fill="#cce6ff"/>
</svg>
